<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#005A9E"/>
    </linearGradient>
    <linearGradient id="ring" x1="80" y1="80" x2="432" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0E8FF"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Clock outer ring -->
  <circle cx="256" cy="256" r="176" stroke="url(#ring)" stroke-width="24" fill="none"/>

  <!-- Hour ticks (12 positions) -->
  <g stroke="#FFFFFF" stroke-width="10" stroke-linecap="round">
    <!-- 12 -->
    <line x1="256" y1="104" x2="256" y2="130"/>
    <!-- 3 -->
    <line x1="408" y1="256" x2="382" y2="256"/>
    <!-- 6 -->
    <line x1="256" y1="408" x2="256" y2="382"/>
    <!-- 9 -->
    <line x1="104" y1="256" x2="130" y2="256"/>
  </g>

  <!-- Small ticks for other hours -->
  <g stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.6">
    <!-- 1 -->
    <line x1="332" y1="117" x2="322" y2="136"/>
    <!-- 2 -->
    <line x1="395" y1="180" x2="376" y2="190"/>
    <!-- 4 -->
    <line x1="395" y1="332" x2="376" y2="322"/>
    <!-- 5 -->
    <line x1="332" y1="395" x2="322" y2="376"/>
    <!-- 7 -->
    <line x1="180" y1="395" x2="190" y2="376"/>
    <!-- 8 -->
    <line x1="117" y1="332" x2="136" y2="322"/>
    <!-- 10 -->
    <line x1="117" y1="180" x2="136" y2="190"/>
    <!-- 11 -->
    <line x1="180" y1="117" x2="190" y2="136"/>
  </g>

  <!-- Hour hand (pointing to ~10) -->
  <line x1="256" y1="256" x2="190" y2="172" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round"/>

  <!-- Minute hand (pointing to ~2) -->
  <line x1="256" y1="256" x2="340" y2="160" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="14" fill="#FFFFFF"/>

  <!-- Refresh/cycle arrows (bottom-right accent) -->
  <g transform="translate(370, 370)">
    <circle cx="0" cy="0" r="56" fill="#005A9E" stroke="#0078D4" stroke-width="4"/>
    <!-- Circular arrow -->
    <path d="M -20 -8 A 22 22 0 1 1 -8 20" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" fill="none"/>
    <!-- Arrowhead -->
    <polygon points="-16,16 -4,24 -2,12" fill="#FFFFFF"/>
  </g>
</svg>
