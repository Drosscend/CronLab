name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $json = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $version = $json.version
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Check if release already exists
        id: check_release
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $result = gh release view $tag 2>&1
          if ($LASTEXITCODE -eq 0) {
            echo "exists=true" >> $env:GITHUB_OUTPUT
            echo "Release $tag already exists, skipping."
          } else {
            echo "exists=false" >> $env:GITHUB_OUTPUT
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri app
        if: steps.check_release.outputs.exists == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: CronLab ${{ steps.version.outputs.tag }}
          releaseBody: |
            ## CronLab ${{ steps.version.outputs.tag }}

            ### Installation
            Téléchargez le fichier `.msi` ou `.exe` ci-dessous et lancez l'installation.

            ### Changelog
            Voir les [commits](https://github.com/${{ github.repository }}/commits/${{ github.sha }}) depuis la dernière release.
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
